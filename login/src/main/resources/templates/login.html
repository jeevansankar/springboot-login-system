<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #00c6ff;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }

        .success {
            color: green;
            text-align: center;
            margin-top: 10px;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        .link a {
            text-decoration: none;
            color: #4facfe;
        }

    </style>
</head>
<body>

<div class="login-container">

    <h2>User Login</h2>

    <!-- Login Form -->
    <form th:action="@{/login}" method="post">

        <input type="text" name="username" placeholder="Enter Username" required />

        <input type="password" name="password" placeholder="Enter Password" required />

        <button type="submit">Login</button>

    </form>

    <!-- Error Message -->
    <div class="error" th:if="${error}" th:text="${error}"></div>

    <!-- Success Message -->
    <div class="success" th:if="${message}" th:text="${message}"></div>

    <!-- Register Link -->
    <div class="link">
        Don't have an account?
        <a th:href="@{/register}">Register here</a>
    </div>

</div>

</body>
</html>
